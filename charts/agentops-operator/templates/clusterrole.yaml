{{- if and .Values.rbac.create (not .Values.rbac.namespaced) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agentops-operator.fullname" . }}-manager
  labels:
    {{- include "agentops-operator.labels" . | nindent 4 }}
rules:
  {{- include "agentops-operator.managerRules" . | nindent 2 }}
{{- end }}
