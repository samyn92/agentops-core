# Generic webhook channel example
apiVersion: agents.agentops.io/v1alpha1
kind: Channel
metadata:
  name: generic-webhook-channel
  labels:
    app.kubernetes.io/name: agentops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  type: webhook
  agentRef: code-review-agent

  webhookConfig:
    secret:
      name: generic-webhook-secret
      key: token

  prompt: |
    Process the incoming webhook payload and summarize required follow-up.

  webhook:
    host: webhooks.agentops.example.com
    path: /generic/events
    ingressClassName: nginx

  image: ghcr.io/samyn92/channel-webhook:latest
