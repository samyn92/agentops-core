apiVersion: agents.agenticops.io/v1alpha1
kind: Channel
metadata:
  name: gitlab-mr-channel
  labels:
    app.kubernetes.io/name: agenticops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  type: gitlab
  agentRef: code-review-agent

  gitlab:
    events:
      - "Merge Request Hook"
    actions:
      - "open"
      - "update"
    labels:
      - "needs-review"
    secret:
      name: gitlab-webhook-secret
      key: token

  prompt: |
    Review the merge request "{{ .object_attributes.title }}" in project
    {{ .project.path_with_namespace }}.
    MR URL: {{ .object_attributes.url }}
    Description: {{ .object_attributes.description }}
    Focus on code quality, bugs, and security issues.

  webhook:
    host: webhooks.agenticops.example.com
    path: /gitlab/code-review
    ingressClassName: nginx
    tls:
      clusterIssuer: letsencrypt-prod

  image: ghcr.io/samyn92/channel-gitlab:latest
  imagePullPolicy: IfNotPresent
  replicas: 1

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
---
# Telegram chat channel example
apiVersion: agents.agenticops.io/v1alpha1
kind: Channel
metadata:
  name: telegram-chat
  labels:
    app.kubernetes.io/name: agenticops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  type: telegram
  agentRef: code-review-agent

  telegram:
    botTokenSecret:
      name: telegram-bot-secret
      key: BOT_TOKEN
    allowedUsers:
      - "123456789"

  image: ghcr.io/samyn92/channel-telegram:latest
