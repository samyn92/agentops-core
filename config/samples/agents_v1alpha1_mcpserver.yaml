# Deploy mode: operator manages the MCP server lifecycle
apiVersion: agents.agenticops.io/v1alpha1
kind: MCPServer
metadata:
  name: gitlab-mcp
  labels:
    app.kubernetes.io/name: agenticops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  image: ghcr.io/samyn92/mcp-gitlab:latest
  port: 8080
  command:
    - node
    - /app/server.js

  env:
    GITLAB_URL: "https://gitlab.com"

  secrets:
    - name: GITLAB_TOKEN
      secretRef:
        name: gitlab-credentials
        key: token

  healthCheck:
    path: /health
    intervalSeconds: 30

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
