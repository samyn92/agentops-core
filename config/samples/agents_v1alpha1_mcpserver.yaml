# External mode: operator validates and health-checks an existing MCP server.
# Use this when the MCP server is managed outside the operator (e.g. a SaaS
# endpoint or a separate deployment).
apiVersion: agents.agentops.io/v1alpha1
kind: MCPServer
metadata:
  name: gitlab-mcp
  labels:
    app.kubernetes.io/name: agentops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  url: "https://mcp.example.com/gitlab"

  healthCheck:
    url: "https://mcp.example.com/gitlab/health"
    intervalSeconds: 30
---
