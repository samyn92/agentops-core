# Example: Task mode agent with OCI tools, context, and scheduling
apiVersion: agents.agentops.io/v1alpha1
kind: Agent
metadata:
  name: scheduled-oci-agent
  labels:
    app.kubernetes.io/name: agentops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  mode: task
  model: openai/gpt-4.1-mini

  image: ghcr.io/samyn92/agent-runtime-fantasy:latest
  imagePullPolicy: IfNotPresent
  builtinTools: []

  providers:
    - name: openai
      apiKeySecret:
        name: llm-api-keys
        key: OPENAI_API_KEY

  systemPrompt: |
    You triage issues, propose next actions, and keep outputs concise.

  contextFiles:
    - configMapRef:
        name: agent-context
        key: AGENTS.md

  # OCI tools (MCP servers)
  toolRefs:
    - name: jira_tools
      ociRef:
        ref: ghcr.io/samyn92/tools/jira:0.1.0
        pullPolicy: IfNotPresent
    - name: repo_helpers
      configMapRef:
        name: agent-tool-bundles
        key: manifest.json

  env:
    WORKSPACE_ROOT: /workspace
    FEATURE_FLAGS: issue-triage

  secrets:
    - name: GITHUB_TOKEN
      secretRef:
        name: scm-credentials
        key: github-token

  schedule: "0 * * * *"
  schedulePrompt: |
    Check newly opened incidents and propose next actions.

  toolHooks:
    auditTools:
      - jira_tools

  networkPolicy:
    enabled: true

  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi

  timeout: "10m"
