# GitHub webhook channel example
apiVersion: agents.agentops.io/v1alpha1
kind: Channel
metadata:
  name: github-pr-channel
  labels:
    app.kubernetes.io/name: agentops-core
    app.kubernetes.io/managed-by: kustomize
spec:
  type: github
  agentRef: code-review-agent

  github:
    events:
      - pull_request
    actions:
      - opened
      - synchronize
    labels:
      - needs-review
    secret:
      name: github-webhook-secret
      key: secret

  prompt: |
    Review pull request "{{ .pull_request.title }}" in {{ .repository.full_name }}.
    URL: {{ .pull_request.html_url }}
    Description: {{ .pull_request.body }}

  webhook:
    host: webhooks.agentops.example.com
    path: /github/code-review
    ingressClassName: nginx

  image: ghcr.io/samyn92/channel-github:latest
