---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agentresources.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: AgentResource
    listKind: AgentResourceList
    plural: agentresources
    shortNames:
    - ares
    singular: agentresource
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.kind
      name: Kind
      type: string
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentResource is the Schema for the agentresources API.
          A declarative catalog entry for an external resource (Git repo, GitLab group,
          MCP endpoint, S3 bucket, documentation, etc.) that agents can work with.
          Agents bind to resources via spec.resources, and users can select them
          in the console UI to scope prompts.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentResourceSpec defines the desired state of AgentResource.
            properties:
              credentials:
                description: |-
                  Optional credentials for accessing the resource.
                  The secret key usage is kind-specific (e.g. API token for GitHub/GitLab,
                  SSH key for git, AWS credentials for S3).
                properties:
                  key:
                    description: Key within the Secret.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - key
                - name
                type: object
              description:
                description: Optional description of the resource for UI tooltips.
                type: string
              displayName:
                description: Human-friendly display name shown in the console UI.
                minLength: 1
                type: string
              documentation:
                description: 'Documentation configuration (kind: documentation).'
                properties:
                  configMapRef:
                    description: ConfigMap containing documentation content (e.g.
                      markdown files).
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  urls:
                    description: URLs to documentation pages.
                    items:
                      type: string
                    type: array
                type: object
              git:
                description: 'Plain git repository configuration (kind: git-repo).'
                properties:
                  branch:
                    description: Default branch. If unset, uses the repo default.
                    type: string
                  sshKeySecret:
                    description: SSH private key secret (for SSH URLs). Overrides
                      credentials if set.
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  url:
                    description: Git clone URL (HTTPS or SSH).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              github:
                description: 'GitHub repository configuration (kind: github-repo).'
                properties:
                  apiURL:
                    description: |-
                      GitHub API base URL. Defaults to https://api.github.com for github.com.
                      Set this for GitHub Enterprise.
                    type: string
                  defaultBranch:
                    description: Default branch to use (e.g. "main"). If unset, uses
                      the repo default.
                    type: string
                  owner:
                    description: Repository owner (user or org).
                    minLength: 1
                    type: string
                  repo:
                    description: Repository name.
                    minLength: 1
                    type: string
                required:
                - owner
                - repo
                type: object
              githubOrg:
                description: 'GitHub organization configuration (kind: github-org).'
                properties:
                  apiURL:
                    description: GitHub API base URL. Defaults to https://api.github.com
                      for github.com.
                    type: string
                  org:
                    description: Organization name.
                    minLength: 1
                    type: string
                  repoFilter:
                    description: Optional filter to include only specific repos (glob
                      patterns).
                    items:
                      type: string
                    type: array
                required:
                - org
                type: object
              gitlab:
                description: 'GitLab project configuration (kind: gitlab-project).'
                properties:
                  baseURL:
                    description: GitLab base URL (e.g. https://gitlab.com).
                    minLength: 1
                    type: string
                  defaultBranch:
                    description: Default branch to use. If unset, uses the project
                      default.
                    type: string
                  project:
                    description: Project path (e.g. "group/subgroup/project").
                    minLength: 1
                    type: string
                required:
                - baseURL
                - project
                type: object
              gitlabGroup:
                description: 'GitLab group configuration (kind: gitlab-group).'
                properties:
                  baseURL:
                    description: GitLab base URL (e.g. https://gitlab.com).
                    minLength: 1
                    type: string
                  group:
                    description: Group path (e.g. "myorg" or "myorg/subgroup").
                    minLength: 1
                    type: string
                  projects:
                    description: Optional filter to include only specific projects
                      within the group.
                    items:
                      type: string
                    type: array
                required:
                - baseURL
                - group
                type: object
              kind:
                description: Kind of resource (e.g. github-repo, gitlab-group, git-repo,
                  mcp-endpoint).
                enum:
                - github-repo
                - github-org
                - gitlab-project
                - gitlab-group
                - git-repo
                - mcp-endpoint
                - s3-bucket
                - documentation
                type: string
              mcp:
                description: 'MCP endpoint configuration (kind: mcp-endpoint).'
                properties:
                  headers:
                    additionalProperties:
                      type: string
                    description: Static headers to send with requests.
                    type: object
                  transport:
                    default: sse
                    description: 'Transport type: sse or streamable-http.'
                    enum:
                    - sse
                    - streamable-http
                    type: string
                  url:
                    description: MCP server URL (SSE or streamable HTTP).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              s3:
                description: 'S3 bucket configuration (kind: s3-bucket).'
                properties:
                  bucket:
                    description: Bucket name.
                    minLength: 1
                    type: string
                  endpoint:
                    description: Endpoint URL for S3-compatible storage (e.g. MinIO).
                    type: string
                  prefix:
                    description: Prefix to scope access within the bucket.
                    type: string
                  region:
                    description: Region.
                    type: string
                required:
                - bucket
                type: object
            required:
            - displayName
            - kind
            type: object
          status:
            description: AgentResourceStatus defines the observed state of AgentResource.
            properties:
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: 'Current phase: Pending, Ready, Failed.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
