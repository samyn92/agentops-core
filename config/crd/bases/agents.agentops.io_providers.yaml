---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: providers.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    shortNames:
    - prov
    singular: provider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.boundAgents
      name: Agents
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Provider configures an LLM provider that Agents reference.
          Providers are namespace-scoped — agents and providers must share a namespace.
          Extracts credentials, endpoint, and per-call configuration from Agent CRs
          into a shared, reusable resource that maps to Fantasy SDK provider backends.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProviderSpec defines the desired state of Provider.
            properties:
              apiKeySecret:
                description: Secret containing the API key for this provider.
                properties:
                  key:
                    description: Key within the Secret.
                    type: string
                  name:
                    description: Name of the Secret.
                    type: string
                required:
                - key
                - name
                type: object
              config:
                description: |-
                  Provider-type-specific configuration.
                  Only the fields relevant to spec.type are used; others are ignored.
                properties:
                  azureAPIVersion:
                    description: |-
                      Azure API version. Default: "2025-01-01-preview".
                      Applies to: azure.
                    type: string
                  bedrock:
                    description: Enable AWS Bedrock routing.
                    type: boolean
                  organization:
                    description: |-
                      OpenAI organization ID (sets OpenAI-Organization header).
                      Applies to: openai.
                    type: string
                  project:
                    description: |-
                      OpenAI project ID (sets OpenAI-Project header).
                      Applies to: openai.
                    type: string
                  useResponsesAPI:
                    description: |-
                      Use the OpenAI Responses API for models that support it.
                      Applies to: openai, azure, openaicompat.
                    type: boolean
                  vertex:
                    description: VertexConfig configures Google Cloud Vertex AI.
                    properties:
                      location:
                        description: GCP region (e.g. "us-central1").
                        minLength: 1
                        type: string
                      project:
                        description: GCP project ID.
                        minLength: 1
                        type: string
                    required:
                    - location
                    - project
                    type: object
                type: object
              defaults:
                description: |-
                  Default per-call options applied to all agents using this provider.
                  Agents can override these via providerRefs[].overrides.
                properties:
                  anthropic:
                    description: Anthropic-specific call options.
                    properties:
                      disableParallelToolUse:
                        description: Disable parallel tool use.
                        type: boolean
                      effort:
                        description: 'Output effort level: low, medium, high, max.'
                        enum:
                        - low
                        - medium
                        - high
                        - max
                        type: string
                      thinkingBudgetTokens:
                        description: Extended thinking budget in tokens.
                        format: int64
                        minimum: 1024
                        type: integer
                    type: object
                  google:
                    description: Google-specific call options.
                    properties:
                      safetySettings:
                        description: Safety settings applied to all calls.
                        items:
                          description: GoogleSafetySetting configures a safety threshold
                            for a harm category.
                          properties:
                            category:
                              description: Harm category (e.g. "HARM_CATEGORY_DANGEROUS_CONTENT").
                              type: string
                            threshold:
                              description: Block threshold (e.g. "BLOCK_ONLY_HIGH").
                              type: string
                          required:
                          - category
                          - threshold
                          type: object
                        type: array
                      thinkingBudgetTokens:
                        description: Thinking budget in tokens. Mutually exclusive
                          with ThinkingLevel.
                        format: int64
                        minimum: 128
                        type: integer
                      thinkingLevel:
                        description: 'Thinking level: LOW, MEDIUM, HIGH, MINIMAL.'
                        enum:
                        - LOW
                        - MEDIUM
                        - HIGH
                        - MINIMAL
                        type: string
                    type: object
                  openai:
                    description: OpenAI-specific call options.
                    properties:
                      reasoningEffort:
                        description: 'Reasoning effort: none, minimal, low, medium,
                          high, xhigh.'
                        enum:
                        - none
                        - minimal
                        - low
                        - medium
                        - high
                        - xhigh
                        type: string
                      serviceTier:
                        description: Service tier selection (e.g. "default", "flex").
                        type: string
                    type: object
                type: object
              endpoint:
                description: Endpoint configuration (optional, defaults per type).
                properties:
                  baseURL:
                    description: Base URL override. Empty uses the SDK default for
                      the provider type.
                    type: string
                  headers:
                    additionalProperties:
                      type: string
                    description: |-
                      Custom HTTP headers injected into every API request.
                      Useful for proxy auth, rate-limit tokens, observability headers.
                    type: object
                type: object
              type:
                description: |-
                  Type selects the Fantasy SDK backend.
                  Known values: anthropic, openai, google, azure, bedrock, openrouter, openaicompat.
                enum:
                - anthropic
                - openai
                - google
                - azure
                - bedrock
                - openrouter
                - openaicompat
                type: string
            required:
            - apiKeySecret
            - type
            type: object
          status:
            description: ProviderStatus defines the observed state of Provider.
            properties:
              boundAgents:
                description: Number of Agent CRs currently referencing this provider.
                type: integer
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              message:
                description: Human-readable status message.
                type: string
              phase:
                description: 'Current phase: Pending, Ready, Failed.'
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
