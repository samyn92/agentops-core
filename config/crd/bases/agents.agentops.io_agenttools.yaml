---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agenttools.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: AgentTool
    listKind: AgentToolList
    plural: agenttools
    shortNames:
    - agtool
    singular: agenttool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.sourceType
      name: Source
      type: string
    - jsonPath: .spec.category
      name: Category
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.serviceURL
      name: URL
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentTool is the Schema for the agenttools API.
          Unified tool catalog entry. Defines a tool by what it does, not how
          it's delivered. The source block (oci, configMap, inline, mcpServer,
          mcpEndpoint, skill) determines how the operator provisions the tool.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentToolSpec defines the desired state of AgentTool.
              Exactly one source block must be set.
            properties:
              category:
                description: Category for console UI grouping (e.g. "infrastructure",
                  "coding", "data").
                type: string
              configMap:
                description: |-
                  ConfigMap containing a tool script (e.g. index.js).
                  Mounted as a volume at /tools/<name>.
                properties:
                  key:
                    description: Key within the ConfigMap.
                    type: string
                  name:
                    description: ConfigMap name.
                    type: string
                required:
                - key
                - name
                type: object
              defaultPermissions:
                description: Default permission configuration for this tool.
                properties:
                  mode:
                    description: Deny/allow mode for MCP tool calls (mcpServer/mcpEndpoint
                      sources only).
                    enum:
                    - deny
                    - allow
                    type: string
                  requireApproval:
                    description: Require user approval before execution.
                    type: boolean
                  rules:
                    description: Rules for deny/allow filtering.
                    items:
                      type: string
                    type: array
                type: object
              description:
                description: Human-friendly description shown in the console UI.
                type: string
              inline:
                description: |-
                  Inline tool content (< 4KB, prototyping only).
                  Written to a ConfigMap by the operator, mounted at /tools/<name>.
                properties:
                  content:
                    description: Tool script content.
                    type: string
                required:
                - content
                type: object
              mcpEndpoint:
                description: |-
                  External MCP endpoint (absorbs MCPServer external mode).
                  Operator health-checks, agents connect via gateway sidecar.
                properties:
                  headers:
                    additionalProperties:
                      type: string
                    description: Static headers.
                    type: object
                  healthCheck:
                    description: Health check configuration.
                    properties:
                      intervalSeconds:
                        default: 30
                        description: Probe interval in seconds.
                        type: integer
                      path:
                        description: Health check path (deploy mode) or full URL (external
                          mode).
                        type: string
                      url:
                        description: Health check URL (external mode only).
                        type: string
                    type: object
                  oauth:
                    description: OAuth configuration.
                    properties:
                      clientIdSecret:
                        description: Secret containing the OAuth client ID.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      clientSecretSecret:
                        description: Secret containing the OAuth client secret.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - clientIdSecret
                    - clientSecretSecret
                    type: object
                  transport:
                    default: sse
                    description: 'Transport type: sse or streamable-http.'
                    enum:
                    - sse
                    - streamable-http
                    type: string
                  url:
                    description: URL of the external MCP server.
                    type: string
                required:
                - url
                type: object
              mcpServer:
                description: |-
                  MCP server deployed by the operator (absorbs MCPServer deploy mode).
                  Operator creates Deployment+Service, agents connect via gateway sidecar.
                properties:
                  command:
                    description: Override command for the container.
                    items:
                      type: string
                    type: array
                  env:
                    additionalProperties:
                      type: string
                    description: Plain-text environment variables.
                    type: object
                  healthCheck:
                    description: Health check configuration.
                    properties:
                      intervalSeconds:
                        default: 30
                        description: Probe interval in seconds.
                        type: integer
                      path:
                        description: Health check path (deploy mode) or full URL (external
                          mode).
                        type: string
                      url:
                        description: Health check URL (external mode only).
                        type: string
                    type: object
                  image:
                    description: Container image for the MCP server.
                    type: string
                  port:
                    default: 8080
                    description: Port the MCP server listens on.
                    format: int32
                    type: integer
                  resources:
                    description: Compute resources.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  secrets:
                    description: Secret-backed environment variables.
                    items:
                      description: SecretEnvVar injects a Secret key as an environment
                        variable.
                      properties:
                        name:
                          description: Environment variable name.
                          type: string
                        secretRef:
                          description: Reference to the secret key.
                          properties:
                            key:
                              description: Key within the Secret.
                              type: string
                            name:
                              description: Name of the Secret.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - name
                      - secretRef
                      type: object
                    type: array
                  security:
                    description: Security overrides for the MCP server pod. See SecurityOverrides.
                    properties:
                      automountServiceAccountToken:
                        description: |-
                          AutomountServiceAccountToken opts the workload's pod into
                          receiving its ServiceAccount's API token. Default false; set
                          to true only for workloads that legitimately call the Kubernetes
                          API at runtime.
                        type: boolean
                      container:
                        description: |-
                          Container-level overrides applied to the workload's main container
                          only. Init containers and operator-injected sidecars (mcp-gateway,
                          token-injector) always use the restricted defaults. Cannot enable
                          privilege escalation, disable RO rootfs, disable RunAsNonRoot,
                          or add capabilities.
                        properties:
                          allowPrivilegeEscalation:
                            description: |-
                              AllowPrivilegeEscalation controls whether a process can gain more
                              privileges than its parent process. This bool directly controls if
                              the no_new_privs flag will be set on the container process.
                              AllowPrivilegeEscalation is true always when the container is:
                              1) run as Privileged
                              2) has CAP_SYS_ADMIN
                              Note that this field cannot be set when spec.os.name is windows.
                            type: boolean
                          appArmorProfile:
                            description: |-
                              appArmorProfile is the AppArmor options to use by this container. If set, this profile
                              overrides the pod's appArmorProfile.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              localhostProfile:
                                description: |-
                                  localhostProfile indicates a profile loaded on the node that should be used.
                                  The profile must be preconfigured on the node to work.
                                  Must match the loaded name of the profile.
                                  Must be set if and only if type is "Localhost".
                                type: string
                              type:
                                description: |-
                                  type indicates which kind of AppArmor profile will be applied.
                                  Valid options are:
                                    Localhost - a profile pre-loaded on the node.
                                    RuntimeDefault - the container runtime's default profile.
                                    Unconfined - no AppArmor enforcement.
                                type: string
                            required:
                            - type
                            type: object
                          capabilities:
                            description: |-
                              The capabilities to add/drop when running containers.
                              Defaults to the default set of capabilities granted by the container runtime.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              add:
                                description: Added capabilities
                                items:
                                  description: Capability represent POSIX capabilities
                                    type
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                              drop:
                                description: Removed capabilities
                                items:
                                  description: Capability represent POSIX capabilities
                                    type
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            type: object
                          privileged:
                            description: |-
                              Run container in privileged mode.
                              Processes in privileged containers are essentially equivalent to root on the host.
                              Defaults to false.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: boolean
                          procMount:
                            description: |-
                              procMount denotes the type of proc mount to use for the containers.
                              The default value is Default which uses the container runtime defaults for
                              readonly paths and masked paths.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: string
                          readOnlyRootFilesystem:
                            description: |-
                              Whether this container has a read-only root filesystem.
                              Default is false.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: boolean
                          runAsGroup:
                            description: |-
                              The GID to run the entrypoint of the container process.
                              Uses runtime default if unset.
                              May also be set in PodSecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                              Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          runAsNonRoot:
                            description: |-
                              Indicates that the container must run as a non-root user.
                              If true, the Kubelet will validate the image at runtime to ensure that it
                              does not run as UID 0 (root) and fail to start the container if it does.
                              If unset or false, no such validation will be performed.
                              May also be set in PodSecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                            type: boolean
                          runAsUser:
                            description: |-
                              The UID to run the entrypoint of the container process.
                              Defaults to user specified in image metadata if unspecified.
                              May also be set in PodSecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                              Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          seLinuxOptions:
                            description: |-
                              The SELinux context to be applied to the container.
                              If unspecified, the container runtime will allocate a random SELinux context for each
                              container.  May also be set in PodSecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              level:
                                description: Level is SELinux level label that applies
                                  to the container.
                                type: string
                              role:
                                description: Role is a SELinux role label that applies
                                  to the container.
                                type: string
                              type:
                                description: Type is a SELinux type label that applies
                                  to the container.
                                type: string
                              user:
                                description: User is a SELinux user label that applies
                                  to the container.
                                type: string
                            type: object
                          seccompProfile:
                            description: |-
                              The seccomp options to use by this container. If seccomp options are
                              provided at both the pod & container level, the container options
                              override the pod options.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              localhostProfile:
                                description: |-
                                  localhostProfile indicates a profile defined in a file on the node should be used.
                                  The profile must be preconfigured on the node to work.
                                  Must be a descending path, relative to the kubelet's configured seccomp profile location.
                                  Must be set if type is "Localhost". Must NOT be set for any other type.
                                type: string
                              type:
                                description: |-
                                  type indicates which kind of seccomp profile will be applied.
                                  Valid options are:

                                  Localhost - a profile defined in a file on the node should be used.
                                  RuntimeDefault - the container runtime default profile should be used.
                                  Unconfined - no profile should be applied.
                                type: string
                            required:
                            - type
                            type: object
                          windowsOptions:
                            description: |-
                              The Windows specific settings applied to all containers.
                              If unspecified, the options from the PodSecurityContext will be used.
                              If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                              Note that this field cannot be set when spec.os.name is linux.
                            properties:
                              gmsaCredentialSpec:
                                description: |-
                                  GMSACredentialSpec is where the GMSA admission webhook
                                  (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                                  GMSA credential spec named by the GMSACredentialSpecName field.
                                type: string
                              gmsaCredentialSpecName:
                                description: GMSACredentialSpecName is the name of
                                  the GMSA credential spec to use.
                                type: string
                              hostProcess:
                                description: |-
                                  HostProcess determines if a container should be run as a 'Host Process' container.
                                  All of a Pod's containers must have the same effective HostProcess value
                                  (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                                  In addition, if HostProcess is true then HostNetwork must also be set to true.
                                type: boolean
                              runAsUserName:
                                description: |-
                                  The UserName in Windows to run the entrypoint of the container process.
                                  Defaults to the user specified in image metadata if unspecified.
                                  May also be set in PodSecurityContext. If set in both SecurityContext and
                                  PodSecurityContext, the value specified in SecurityContext takes precedence.
                                type: string
                            type: object
                        type: object
                      pod:
                        description: |-
                          Pod-level overrides (e.g. RunAsUser, FSGroup, SupplementalGroups,
                          custom seccomp profile path). Cannot disable RunAsNonRoot or use
                          root UID 0.
                        properties:
                          appArmorProfile:
                            description: |-
                              appArmorProfile is the AppArmor options to use by the containers in this pod.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              localhostProfile:
                                description: |-
                                  localhostProfile indicates a profile loaded on the node that should be used.
                                  The profile must be preconfigured on the node to work.
                                  Must match the loaded name of the profile.
                                  Must be set if and only if type is "Localhost".
                                type: string
                              type:
                                description: |-
                                  type indicates which kind of AppArmor profile will be applied.
                                  Valid options are:
                                    Localhost - a profile pre-loaded on the node.
                                    RuntimeDefault - the container runtime's default profile.
                                    Unconfined - no AppArmor enforcement.
                                type: string
                            required:
                            - type
                            type: object
                          fsGroup:
                            description: |-
                              A special supplemental group that applies to all containers in a pod.
                              Some volume types allow the Kubelet to change the ownership of that volume
                              to be owned by the pod:

                              1. The owning GID will be the FSGroup
                              2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
                              3. The permission bits are OR'd with rw-rw----

                              If unset, the Kubelet will not modify the ownership and permissions of any volume.
                              Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          fsGroupChangePolicy:
                            description: |-
                              fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
                              before being exposed inside Pod. This field will only apply to
                              volume types which support fsGroup based ownership(and permissions).
                              It will have no effect on ephemeral volume types such as: secret, configmaps
                              and emptydir.
                              Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: string
                          runAsGroup:
                            description: |-
                              The GID to run the entrypoint of the container process.
                              Uses runtime default if unset.
                              May also be set in SecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence
                              for that container.
                              Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          runAsNonRoot:
                            description: |-
                              Indicates that the container must run as a non-root user.
                              If true, the Kubelet will validate the image at runtime to ensure that it
                              does not run as UID 0 (root) and fail to start the container if it does.
                              If unset or false, no such validation will be performed.
                              May also be set in SecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence.
                            type: boolean
                          runAsUser:
                            description: |-
                              The UID to run the entrypoint of the container process.
                              Defaults to user specified in image metadata if unspecified.
                              May also be set in SecurityContext.  If set in both SecurityContext and
                              PodSecurityContext, the value specified in SecurityContext takes precedence
                              for that container.
                              Note that this field cannot be set when spec.os.name is windows.
                            format: int64
                            type: integer
                          seLinuxChangePolicy:
                            description: |-
                              seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
                              It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
                              Valid values are "MountOption" and "Recursive".

                              "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
                              This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

                              "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
                              This requires all Pods that share the same volume to use the same SELinux label.
                              It is not possible to share the same volume among privileged and unprivileged Pods.
                              Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
                              whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
                              CSIDriver instance. Other volumes are always re-labelled recursively.
                              "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

                              If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
                              If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
                              and "Recursive" for all other volumes.

                              This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

                              All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: string
                          seLinuxOptions:
                            description: |-
                              The SELinux context to be applied to all containers.
                              If unspecified, the container runtime will allocate a random SELinux context for each
                              container.  May also be set in SecurityContext.  If set in
                              both SecurityContext and PodSecurityContext, the value specified in SecurityContext
                              takes precedence for that container.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              level:
                                description: Level is SELinux level label that applies
                                  to the container.
                                type: string
                              role:
                                description: Role is a SELinux role label that applies
                                  to the container.
                                type: string
                              type:
                                description: Type is a SELinux type label that applies
                                  to the container.
                                type: string
                              user:
                                description: User is a SELinux user label that applies
                                  to the container.
                                type: string
                            type: object
                          seccompProfile:
                            description: |-
                              The seccomp options to use by the containers in this pod.
                              Note that this field cannot be set when spec.os.name is windows.
                            properties:
                              localhostProfile:
                                description: |-
                                  localhostProfile indicates a profile defined in a file on the node should be used.
                                  The profile must be preconfigured on the node to work.
                                  Must be a descending path, relative to the kubelet's configured seccomp profile location.
                                  Must be set if type is "Localhost". Must NOT be set for any other type.
                                type: string
                              type:
                                description: |-
                                  type indicates which kind of seccomp profile will be applied.
                                  Valid options are:

                                  Localhost - a profile defined in a file on the node should be used.
                                  RuntimeDefault - the container runtime default profile should be used.
                                  Unconfined - no profile should be applied.
                                type: string
                            required:
                            - type
                            type: object
                          supplementalGroups:
                            description: |-
                              A list of groups applied to the first process run in each container, in
                              addition to the container's primary GID and fsGroup (if specified).  If
                              the SupplementalGroupsPolicy feature is enabled, the
                              supplementalGroupsPolicy field determines whether these are in addition
                              to or instead of any group memberships defined in the container image.
                              If unspecified, no additional groups are added, though group memberships
                              defined in the container image may still be used, depending on the
                              supplementalGroupsPolicy field.
                              Note that this field cannot be set when spec.os.name is windows.
                            items:
                              format: int64
                              type: integer
                            type: array
                            x-kubernetes-list-type: atomic
                          supplementalGroupsPolicy:
                            description: |-
                              Defines how supplemental groups of the first container processes are calculated.
                              Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
                              (Alpha) Using the field requires the SupplementalGroupsPolicy feature gate to be enabled
                              and the container runtime must implement support for this feature.
                              Note that this field cannot be set when spec.os.name is windows.
                            type: string
                          sysctls:
                            description: |-
                              Sysctls hold a list of namespaced sysctls used for the pod. Pods with unsupported
                              sysctls (by the container runtime) might fail to launch.
                              Note that this field cannot be set when spec.os.name is windows.
                            items:
                              description: Sysctl defines a kernel parameter to be
                                set
                              properties:
                                name:
                                  description: Name of a property to set
                                  type: string
                                value:
                                  description: Value of a property to set
                                  type: string
                              required:
                              - name
                              - value
                              type: object
                            type: array
                            x-kubernetes-list-type: atomic
                          windowsOptions:
                            description: |-
                              The Windows specific settings applied to all containers.
                              If unspecified, the options within a container's SecurityContext will be used.
                              If set in both SecurityContext and PodSecurityContext, the value specified in SecurityContext takes precedence.
                              Note that this field cannot be set when spec.os.name is linux.
                            properties:
                              gmsaCredentialSpec:
                                description: |-
                                  GMSACredentialSpec is where the GMSA admission webhook
                                  (https://github.com/kubernetes-sigs/windows-gmsa) inlines the contents of the
                                  GMSA credential spec named by the GMSACredentialSpecName field.
                                type: string
                              gmsaCredentialSpecName:
                                description: GMSACredentialSpecName is the name of
                                  the GMSA credential spec to use.
                                type: string
                              hostProcess:
                                description: |-
                                  HostProcess determines if a container should be run as a 'Host Process' container.
                                  All of a Pod's containers must have the same effective HostProcess value
                                  (it is not allowed to have a mix of HostProcess containers and non-HostProcess containers).
                                  In addition, if HostProcess is true then HostNetwork must also be set to true.
                                type: boolean
                              runAsUserName:
                                description: |-
                                  The UserName in Windows to run the entrypoint of the container process.
                                  Defaults to the user specified in image metadata if unspecified.
                                  May also be set in PodSecurityContext. If set in both SecurityContext and
                                  PodSecurityContext, the value specified in SecurityContext takes precedence.
                                type: string
                            type: object
                        type: object
                    type: object
                  serviceAccountName:
                    description: ServiceAccount for the MCP server pod.
                    type: string
                required:
                - image
                type: object
              oci:
                description: |-
                  OCI artifact containing an MCP tool server binary.
                  Operator pulls via crane init container, runtime launches as stdio MCP server.
                properties:
                  digest:
                    description: Optional digest for pinning.
                    type: string
                  pullPolicy:
                    description: 'Pull policy: Always, IfNotPresent, Never.'
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  pullSecret:
                    description: Pull secret for private registries.
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  ref:
                    description: Full OCI reference (e.g. ghcr.io/samyn92/agent-tools/kubectl:1.0.0).
                    type: string
                required:
                - ref
                type: object
              skill:
                description: |-
                  OCI artifact containing skill markdown (system prompt extensions).
                  Pulled via crane init container, mounted as context files.
                properties:
                  digest:
                    description: Optional digest for pinning.
                    type: string
                  pullPolicy:
                    description: Pull policy.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  pullSecret:
                    description: Pull secret for private registries.
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  ref:
                    description: Full OCI reference for the skill package.
                    type: string
                required:
                - ref
                type: object
              uiHint:
                description: |-
                  UIHint tells the console which branded card renderer to use for this tool's
                  call results. When set, this value is passed through to every FEP tool_result
                  event as metadata.ui, overriding heuristic detection.
                  Known values: "kubernetes-resources", "helm-release", "terminal", "code", "diff",
                  "file-tree", "search-results", "file-created", "web-fetch", "agent-run".
                type: string
            type: object
          status:
            description: AgentToolStatus defines the observed state of AgentTool.
            properties:
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: 'Current phase: Pending, Deploying, Ready, Failed.'
                type: string
              serviceURL:
                description: Service URL for mcpServer/mcpEndpoint sources.
                type: string
              sourceType:
                description: Source type detected from spec (oci, configMap, inline,
                  mcpServer, mcpEndpoint, skill).
                type: string
              tools:
                description: |-
                  Discovered MCP tools exposed by this tool server.
                  Populated by the operator at reconcile time via MCP ListTools introspection.
                items:
                  description: |-
                    DiscoveredTool describes a single MCP tool discovered from a tool server.
                    Populated by the operator during reconciliation via ListTools introspection.
                  properties:
                    description:
                      description: Tool description from the MCP server.
                      type: string
                    inputSchema:
                      description: Input schema as a JSON string (the MCP tool's inputSchema
                        object).
                      type: string
                    name:
                      description: MCP tool name (e.g. "kube_find", "kube_health").
                      type: string
                  required:
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
