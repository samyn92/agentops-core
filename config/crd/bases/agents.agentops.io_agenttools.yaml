---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agenttools.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: AgentTool
    listKind: AgentToolList
    plural: agenttools
    shortNames:
    - agtool
    singular: agenttool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.sourceType
      name: Source
      type: string
    - jsonPath: .spec.category
      name: Category
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.serviceURL
      name: URL
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentTool is the Schema for the agenttools API.
          Unified tool catalog entry. Defines a tool by what it does, not how
          it's delivered. The source block (oci, configMap, inline, mcpServer,
          mcpEndpoint, skill) determines how the operator provisions the tool.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentToolSpec defines the desired state of AgentTool.
              Exactly one source block must be set.
            properties:
              category:
                description: Category for console UI grouping (e.g. "infrastructure",
                  "coding", "data").
                type: string
              configMap:
                description: |-
                  ConfigMap containing a tool script (e.g. index.js).
                  Mounted as a volume at /tools/<name>.
                properties:
                  key:
                    description: Key within the ConfigMap.
                    type: string
                  name:
                    description: ConfigMap name.
                    type: string
                required:
                - key
                - name
                type: object
              defaultPermissions:
                description: Default permission configuration for this tool.
                properties:
                  mode:
                    description: Deny/allow mode for MCP tool calls (mcpServer/mcpEndpoint
                      sources only).
                    enum:
                    - deny
                    - allow
                    type: string
                  requireApproval:
                    description: Require user approval before execution.
                    type: boolean
                  rules:
                    description: Rules for deny/allow filtering.
                    items:
                      type: string
                    type: array
                type: object
              description:
                description: Human-friendly description shown in the console UI.
                type: string
              inline:
                description: |-
                  Inline tool content (< 4KB, prototyping only).
                  Written to a ConfigMap by the operator, mounted at /tools/<name>.
                properties:
                  content:
                    description: Tool script content.
                    type: string
                required:
                - content
                type: object
              mcpEndpoint:
                description: |-
                  External MCP endpoint (absorbs MCPServer external mode).
                  Operator health-checks, agents connect via gateway sidecar.
                properties:
                  headers:
                    additionalProperties:
                      type: string
                    description: Static headers.
                    type: object
                  healthCheck:
                    description: Health check configuration.
                    properties:
                      intervalSeconds:
                        default: 30
                        description: Probe interval in seconds.
                        type: integer
                      path:
                        description: Health check path (deploy mode) or full URL (external
                          mode).
                        type: string
                      url:
                        description: Health check URL (external mode only).
                        type: string
                    type: object
                  oauth:
                    description: OAuth configuration.
                    properties:
                      clientIdSecret:
                        description: Secret containing the OAuth client ID.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      clientSecretSecret:
                        description: Secret containing the OAuth client secret.
                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - clientIdSecret
                    - clientSecretSecret
                    type: object
                  transport:
                    default: sse
                    description: 'Transport type: sse or streamable-http.'
                    enum:
                    - sse
                    - streamable-http
                    type: string
                  url:
                    description: URL of the external MCP server.
                    type: string
                required:
                - url
                type: object
              mcpServer:
                description: |-
                  MCP server deployed by the operator (absorbs MCPServer deploy mode).
                  Operator creates Deployment+Service, agents connect via gateway sidecar.
                properties:
                  command:
                    description: Override command for the container.
                    items:
                      type: string
                    type: array
                  env:
                    additionalProperties:
                      type: string
                    description: Plain-text environment variables.
                    type: object
                  healthCheck:
                    description: Health check configuration.
                    properties:
                      intervalSeconds:
                        default: 30
                        description: Probe interval in seconds.
                        type: integer
                      path:
                        description: Health check path (deploy mode) or full URL (external
                          mode).
                        type: string
                      url:
                        description: Health check URL (external mode only).
                        type: string
                    type: object
                  image:
                    description: Container image for the MCP server.
                    type: string
                  port:
                    default: 8080
                    description: Port the MCP server listens on.
                    format: int32
                    type: integer
                  resources:
                    description: Compute resources.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This is an alpha field and requires enabling the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                  secrets:
                    description: Secret-backed environment variables.
                    items:
                      description: SecretEnvVar injects a Secret key as an environment
                        variable.
                      properties:
                        name:
                          description: Environment variable name.
                          type: string
                        secretRef:
                          description: Reference to the secret key.
                          properties:
                            key:
                              description: Key within the Secret.
                              type: string
                            name:
                              description: Name of the Secret.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                      required:
                      - name
                      - secretRef
                      type: object
                    type: array
                  serviceAccountName:
                    description: ServiceAccount for the MCP server pod.
                    type: string
                required:
                - image
                type: object
              oci:
                description: |-
                  OCI artifact containing an MCP tool server binary.
                  Operator pulls via crane init container, runtime launches as stdio MCP server.
                properties:
                  digest:
                    description: Optional digest for pinning.
                    type: string
                  pullPolicy:
                    description: 'Pull policy: Always, IfNotPresent, Never.'
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  pullSecret:
                    description: Pull secret for private registries.
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  ref:
                    description: Full OCI reference (e.g. ghcr.io/samyn92/agent-tools/kubectl:1.0.0).
                    type: string
                required:
                - ref
                type: object
              skill:
                description: |-
                  OCI artifact containing skill markdown (system prompt extensions).
                  Pulled via crane init container, mounted as context files.
                properties:
                  digest:
                    description: Optional digest for pinning.
                    type: string
                  pullPolicy:
                    description: Pull policy.
                    enum:
                    - Always
                    - IfNotPresent
                    - Never
                    type: string
                  pullSecret:
                    description: Pull secret for private registries.
                    properties:
                      key:
                        description: Key within the Secret.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  ref:
                    description: Full OCI reference for the skill package.
                    type: string
                required:
                - ref
                type: object
              uiHint:
                description: |-
                  UIHint tells the console which branded card renderer to use for this tool's
                  call results. When set, this value is passed through to every FEP tool_result
                  event as metadata.ui, overriding heuristic detection.
                  Known values: "kubernetes-resources", "helm-release", "terminal", "code", "diff",
                  "file-tree", "search-results", "file-created", "web-fetch", "agent-run".
                type: string
            type: object
          status:
            description: AgentToolStatus defines the observed state of AgentTool.
            properties:
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: 'Current phase: Pending, Deploying, Ready, Failed.'
                type: string
              serviceURL:
                description: Service URL for mcpServer/mcpEndpoint sources.
                type: string
              sourceType:
                description: Source type detected from spec (oci, configMap, inline,
                  mcpServer, mcpEndpoint, skill).
                type: string
              tools:
                description: |-
                  Discovered MCP tools exposed by this tool server.
                  Populated by the operator at reconcile time via MCP ListTools introspection.
                items:
                  description: |-
                    DiscoveredTool describes a single MCP tool discovered from a tool server.
                    Populated by the operator during reconciliation via ListTools introspection.
                  properties:
                    description:
                      description: Tool description from the MCP server.
                      type: string
                    inputSchema:
                      description: Input schema as a JSON string (the MCP tool's inputSchema
                        object).
                      type: string
                    name:
                      description: MCP tool name (e.g. "kube_find", "kube_health").
                      type: string
                  required:
                  - name
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
