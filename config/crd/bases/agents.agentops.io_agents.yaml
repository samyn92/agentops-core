---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agents.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
    - ag
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Agent is the Schema for the agents API.
          One CRD for all agents. mode controls lifecycle:
          daemon = Deployment + PVC + Service (always running).
          task = Job template (one prompt, exits).
          The agent runtime is powered by the Charm Fantasy SDK (Go).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentSpec defines the desired state of Agent.
            properties:
              builtinTools:
                description: |-
                  Built-in tools to enable.
                  Valid: bash, read, edit, write, grep, ls, glob, fetch.
                  Omit for all defaults; set to empty list [] to disable all built-in tools.
                items:
                  type: string
                type: array
              concurrency:
                description: Concurrency control for parallel AgentRun execution.
                properties:
                  maxRuns:
                    default: 1
                    description: 'Maximum concurrent runs. Default: 1.'
                    minimum: 1
                    type: integer
                  policy:
                    default: queue
                    description: 'Policy when at max: queue, reject, or replace.'
                    enum:
                    - queue
                    - reject
                    - replace
                    type: string
                type: object
              contextFiles:
                description: Context files loaded from ConfigMaps (e.g. AGENTS.md).
                items:
                  description: ContextFileRef loads an AGENTS.md or similar context
                    file from a ConfigMap.
                  properties:
                    configMapRef:
                      description: ConfigMap reference (name + key).
                      properties:
                        key:
                          description: Key within the Secret.
                          type: string
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - configMapRef
                  type: object
                type: array
              delegation:
                description: |-
                  Delegation controls how this agent delegates work to other agents.
                  Controls outbound behavior: how I use OTHER agents.
                  When set, the operator generates a delegation protocol that is injected
                  as a separate platform protocol section (never appended to systemPrompt).
                  Omit entirely to get no delegation protocol injection.
                properties:
                  maxFanOut:
                    default: 5
                    description: |-
                      MaxFanOut limits the number of concurrent delegations in a single
                      run_agents call. Runtime-enforced cap on batch size.
                      Default: 5. Hard max: 10 (existing run_agents limit).
                    maximum: 10
                    minimum: 1
                    type: integer
                  preferParallel:
                    description: |-
                      PreferParallel favors run_agents (parallel fan-out) over sequential
                      run_agent calls. When true, the delegation protocol instructs the agent
                      to use run_agents for independent subtasks. When false or omitted,
                      the agent delegates one task at a time.
                    type: boolean
                  strategy:
                    description: |-
                      Strategy controls how eagerly this agent delegates work.
                        proactive:    actively decompose and delegate subtasks to specialists
                        conservative: only delegate when lacking tools or expertise
                        manual:       only delegate when user explicitly asks
                    enum:
                    - proactive
                    - conservative
                    - manual
                    type: string
                required:
                - strategy
                type: object
              discovery:
                description: |-
                  Discovery controls how this agent appears to other agents via
                  the list_task_agents tool and who is allowed to delegate to it.
                  Controls inbound visibility: how OTHER agents find and delegate to ME.
                properties:
                  allowedCallers:
                    description: |-
                      AllowedCallers restricts which agents can discover and delegate to this one.
                      Only effective when scope is "explicit". Each entry is an agent name.
                      When scope is "namespace", this field is ignored (all agents can delegate).
                      When scope is "hidden", no agent can discover or delegate.
                    items:
                      type: string
                    type: array
                  description:
                    description: |-
                      Short description shown to other agents in list_task_agents instead of
                      the truncated system prompt. Should describe what this agent is good at
                      in 1-2 sentences.
                    maxLength: 500
                    type: string
                  scope:
                    default: namespace
                    description: |-
                      Scope controls visibility in list_task_agents.
                      "namespace" (default): visible to all agents in the namespace.
                      "explicit": only visible to agents listed in allowedCallers.
                      "hidden": never appears in list_task_agents.
                    enum:
                    - namespace
                    - explicit
                    - hidden
                    type: string
                  tags:
                    description: |-
                      Tags for categorization and filtering. Other agents can use these to
                      find the right specialist (e.g. "kubernetes", "security", "frontend").
                    items:
                      type: string
                    maxItems: 20
                    type: array
                type: object
              enableQuestionTool:
                description: |-
                  Enable the built-in "question" tool that lets the agent ask the user
                  interactive questions during execution.
                type: boolean
              env:
                additionalProperties:
                  type: string
                description: Plain-text environment variables.
                type: object
              fallbackModels:
                description: |-
                  Fallback models tried in order if the primary model fails.
                  Each must reference a provider listed in providers.
                items:
                  type: string
                type: array
              image:
                default: ghcr.io/samyn92/agent-runtime-fantasy:latest
                description: Container image for the Fantasy agent runtime.
                type: string
              imagePullPolicy:
                default: IfNotPresent
                description: Image pull policy.
                enum:
                - Always
                - IfNotPresent
                - Never
                type: string
              maxOutputTokens:
                description: Maximum output tokens per model call.
                format: int64
                type: integer
              maxSteps:
                default: 100
                description: Maximum agent loop steps (safety limit to prevent infinite
                  loops).
                type: integer
              memory:
                description: |-
                  Memory configuration for the Engram shared memory system.
                  When set, the runtime injects recent context and enables
                  memory MCP tools (mem_save, mem_search, etc.).
                properties:
                  autoSave:
                    default: true
                    description: |-
                      Allow the agent to autonomously save memories via mem_save after
                      completing meaningful work. When false, only the user can create
                      memories through the console UI.
                    type: boolean
                  autoSearch:
                    default: true
                    description: |-
                      Allow the agent to autonomously search memories via mem_search
                      when the user references past work. When false, the agent never
                      searches memory on its own — the user browses/searches via the
                      console Memory panel.
                    type: boolean
                  autoSummarize:
                    default: true
                    description: Enable auto-summarization of sessions at end.
                    type: boolean
                  contextLimit:
                    default: 5
                    description: Number of recent context entries injected per turn.
                    maximum: 50
                    minimum: 0
                    type: integer
                  project:
                    description: |-
                      Project name used to scope memories in Engram.
                      Defaults to the Agent CR name if unset.
                    type: string
                  serverRef:
                    description: |-
                      Reference to the memory server. Can be an AgentTool CR name
                      (with mcpServer/mcpEndpoint source) or a plain service name.
                      The runtime connects to Engram's REST API via the resolved
                      service URL.
                    minLength: 1
                    type: string
                required:
                - serverRef
                type: object
              mode:
                description: 'Mode: daemon (Deployment+PVC+Service) or task (Job template).'
                enum:
                - daemon
                - task
                type: string
              model:
                description: Primary model in provider/model format (e.g. anthropic/claude-sonnet-4-20250514).
                minLength: 1
                type: string
              networkPolicy:
                description: Network policy configuration.
                properties:
                  enabled:
                    description: Whether to create a NetworkPolicy.
                    type: boolean
                type: object
              permissionTools:
                description: |-
                  Tools that require user approval before execution (permission gate).
                  Each entry is a tool name. If empty, all tools run automatically.
                items:
                  type: string
                type: array
              primaryProvider:
                description: |-
                  Preferred provider name for model resolution.
                  When the model string does not include a provider prefix, this value
                  is used to select which configured provider handles the request.
                type: string
              providerRefs:
                description: |-
                  Provider references. Each entry names a Provider CR in the same namespace.
                  At least one providerRef is required.
                items:
                  description: ProviderBinding references a Provider CR with optional
                    per-agent overrides.
                  properties:
                    name:
                      description: Name of the Provider CR in the same namespace.
                      minLength: 1
                      type: string
                    overrides:
                      description: Override per-call defaults from the Provider CR
                        for this agent.
                      properties:
                        anthropic:
                          description: Anthropic-specific call options.
                          properties:
                            disableParallelToolUse:
                              description: Disable parallel tool use.
                              type: boolean
                            effort:
                              description: 'Output effort level: low, medium, high,
                                max.'
                              enum:
                              - low
                              - medium
                              - high
                              - max
                              type: string
                            thinkingBudgetTokens:
                              description: Extended thinking budget in tokens.
                              format: int64
                              minimum: 1024
                              type: integer
                          type: object
                        google:
                          description: Google-specific call options.
                          properties:
                            safetySettings:
                              description: Safety settings applied to all calls.
                              items:
                                description: GoogleSafetySetting configures a safety
                                  threshold for a harm category.
                                properties:
                                  category:
                                    description: Harm category (e.g. "HARM_CATEGORY_DANGEROUS_CONTENT").
                                    type: string
                                  threshold:
                                    description: Block threshold (e.g. "BLOCK_ONLY_HIGH").
                                    type: string
                                required:
                                - category
                                - threshold
                                type: object
                              type: array
                            thinkingBudgetTokens:
                              description: Thinking budget in tokens. Mutually exclusive
                                with ThinkingLevel.
                              format: int64
                              minimum: 128
                              type: integer
                            thinkingLevel:
                              description: 'Thinking level: LOW, MEDIUM, HIGH, MINIMAL.'
                              enum:
                              - LOW
                              - MEDIUM
                              - HIGH
                              - MINIMAL
                              type: string
                          type: object
                        openai:
                          description: OpenAI-specific call options.
                          properties:
                            reasoningEffort:
                              description: 'Reasoning effort: none, minimal, low,
                                medium, high, xhigh.'
                              enum:
                              - none
                              - minimal
                              - low
                              - medium
                              - high
                              - xhigh
                              type: string
                            serviceTier:
                              description: Service tier selection (e.g. "default",
                                "flex").
                              type: string
                          type: object
                      type: object
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              resourceBindings:
                description: |-
                  External resources (repos, groups, etc.) bound to this agent.
                  Users can select bound resources in the console UI to scope prompts.
                items:
                  description: AgentResourceBinding references an AgentResource CR
                    from an Agent.
                  properties:
                    autoContext:
                      description: |-
                        Automatically inject this resource context into every prompt
                        without requiring manual selection in the UI.
                      type: boolean
                    name:
                      description: Name of the AgentResource CR to bind.
                      minLength: 1
                      type: string
                    readOnly:
                      description: Mark the resource as read-only for the agent (advisory,
                        enforced by runtime).
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
              resources:
                description: Compute resources for the agent container.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              schedule:
                description: Cron schedule for creating periodic AgentRuns.
                type: string
              schedulePrompt:
                description: Prompt used when schedule triggers an AgentRun.
                type: string
              secrets:
                description: Secret-backed environment variables.
                items:
                  description: SecretEnvVar injects a Secret key as an environment
                    variable.
                  properties:
                    name:
                      description: Environment variable name.
                      type: string
                    secretRef:
                      description: Reference to the secret key.
                      properties:
                        key:
                          description: Key within the Secret.
                          type: string
                        name:
                          description: Name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                type: array
              serviceAccountName:
                description: ServiceAccount for the agent pod.
                type: string
              storage:
                description: Persistent storage for daemon agents (PVC, RWO).
                properties:
                  size:
                    description: PVC size (e.g. "10Gi").
                    type: string
                  storageClass:
                    description: Storage class name.
                    type: string
                required:
                - size
                type: object
              systemPrompt:
                description: System prompt injected at the start of every session.
                type: string
              temperature:
                description: Temperature for model calls (0.0 - 2.0).
                type: number
              timeout:
                default: 10m
                description: Timeout for task jobs or per-prompt timeout for daemons
                  (e.g. "10m").
                type: string
              titleModel:
                description: |-
                  Fast/cheap model used for auto-titling sessions (e.g. openai/gpt-4o-mini).
                  Only relevant for daemon-mode agents. If unset, the primary model is used.
                type: string
              toolHooks:
                description: Runtime security hooks for tool calls.
                properties:
                  allowedPaths:
                    description: Restrict file tool paths to these prefixes (absolute
                      paths only).
                    items:
                      type: string
                    type: array
                  auditTools:
                    description: |-
                      Tools to audit-log via afterToolCall hook. When memory is enabled,
                      audit events are also persisted as searchable observations.
                    items:
                      type: string
                    type: array
                  blockedCommands:
                    description: Patterns blocked in bash commands (substring match).
                    items:
                      type: string
                    type: array
                  contextInjectTools:
                    description: |-
                      Pre-execution memory queries: before a matched tool runs, relevant
                      memories are fetched and recorded in the trace for observability.
                    items:
                      description: ContextInjectRuleSpec describes a pre-execution
                        memory query for a tool.
                      properties:
                        limit:
                          default: 3
                          description: 'Max number of memory items to fetch. Default:
                            3.'
                          maximum: 10
                          minimum: 1
                          type: integer
                        query:
                          default: from_tool_args
                          description: |-
                            How to derive the search query. "from_tool_args" (default) uses the tool's
                            primary argument. Any other value is used as a static query string.
                          type: string
                        tool:
                          description: Tool name to match.
                          type: string
                      required:
                      - tool
                      type: object
                    type: array
                  memorySaveRules:
                    description: |-
                      Declarative rules for auto-saving tool results as memory observations.
                      Each rule matches a tool name and optionally filters by output/args regex.
                    items:
                      description: |-
                        MemorySaveRuleSpec describes a declarative rule for auto-saving tool results
                        as memory observations in agentops-memory.
                      properties:
                        matchArgs:
                          additionalProperties:
                            type: string
                          description: Map of arg_name → regex pattern. All patterns
                            must match for the rule to fire.
                          type: object
                        matchOutput:
                          description: Regex pattern to match against tool output.
                            If empty, all output is captured.
                          type: string
                        scope:
                          default: project
                          description: 'Scope for the observation. Default: "project".'
                          enum:
                          - project
                          - global
                          type: string
                        tool:
                          description: Tool name to match (e.g. "bash", "web_search").
                          type: string
                        type:
                          default: discovery
                          description: 'Observation type to save (e.g. "bugfix", "discovery").
                            Default: "discovery".'
                          type: string
                      required:
                      - tool
                      type: object
                    type: array
                type: object
              tools:
                description: |-
                  Tool bindings referencing AgentTool CRs. Each binding names an
                  AgentTool and allows per-agent permission overrides.
                items:
                  description: AgentToolBinding references an AgentTool CR with optional
                    per-agent overrides.
                  properties:
                    autoContext:
                      description: Auto-inject skill content into every prompt (skill
                        sources only).
                      type: boolean
                    directTools:
                      description: MCP tools to promote to first-class (mcpServer/mcpEndpoint
                        sources only).
                      items:
                        type: string
                      type: array
                    name:
                      description: Name of the AgentTool CR.
                      minLength: 1
                      type: string
                    permissions:
                      description: Override permissions from AgentTool defaults.
                      properties:
                        mode:
                          description: 'Mode: "deny" blocks matching rules, "allow"
                            only permits matching rules.'
                          enum:
                          - deny
                          - allow
                          type: string
                        rules:
                          description: Rules in the form "tool_name", "tool_name:arg=value",
                            or "tool_name:arg=pattern*".
                          items:
                            type: string
                          type: array
                      required:
                      - mode
                      - rules
                      type: object
                  required:
                  - name
                  type: object
                type: array
            required:
            - mode
            - model
            - providerRefs
            type: object
          status:
            description: AgentStatus defines the observed state of Agent.
            properties:
              activeModel:
                description: Currently active model (may differ from spec.model if
                  fallback triggered).
                type: string
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: 'Current phase: Pending, Running (daemon), Ready (task),
                  Failed.'
                type: string
              readyReplicas:
                description: Number of ready replicas (daemon only).
                format: int32
                type: integer
              serviceURL:
                description: Service URL for daemon agents (e.g. http://agent.ns.svc:4096).
                type: string
              storagePVC:
                description: Name of the PVC created for daemon agents.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
