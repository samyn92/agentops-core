---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agentruns.agents.agentops.io
spec:
  group: agents.agentops.io
  names:
    kind: AgentRun
    listKind: AgentRunList
    plural: agentruns
    shortNames:
    - ar
    singular: agentrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.agentRef
      name: Agent
      type: string
    - jsonPath: .spec.source
      name: Source
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.mode
      name: Mode
      type: string
    - jsonPath: .status.outcome.intent
      name: Intent
      type: string
    - jsonPath: .status.outcome.artifacts[0].url
      name: Artifact
      type: string
    - jsonPath: .status.tokensUsed
      name: Tokens
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentRun is the Schema for the agentruns API.
          Tracks one execution of an Agent. Created by Channel, run_agent tool, or schedule.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentRunSpec defines the desired state of AgentRun.
            properties:
              agentRef:
                description: Name of the Agent CR to run.
                minLength: 1
                type: string
              git:
                description: |-
                  Git workspace configuration. When set, the task agent clones the repo,
                  works on a feature branch, and can create/update a PR/MR.
                properties:
                  baseBranch:
                    description: Base branch for the PR/MR target (e.g. "main"). Defaults
                      to the repo's default branch.
                    type: string
                  branch:
                    description: Feature branch to work on. Created from baseBranch
                      if it doesn't exist.
                    minLength: 1
                    type: string
                  resourceRef:
                    description: |-
                      Reference to an AgentResource CR (github-repo, gitlab-project, or git-repo)
                      that provides the repository URL and credentials.
                    minLength: 1
                    type: string
                required:
                - branch
                - resourceRef
                type: object
              outcome:
                description: |-
                  Outcome lets the caller hint the expected intent of the run.
                  The executing agent finalizes the actual intent in status.outcome.
                properties:
                  intent:
                    description: Hinted intent. The executing agent may override in
                      status.outcome.intent.
                    enum:
                    - change
                    - plan
                    - incident
                    - discovery
                    - noop
                    type: string
                type: object
              prompt:
                description: Prompt to send to the agent.
                minLength: 1
                type: string
              source:
                description: 'What created this run: channel, agent, or schedule.'
                enum:
                - channel
                - agent
                - schedule
                - console
                type: string
              sourceRef:
                description: Name of the source (Channel name, agent name, or "schedule").
                type: string
            required:
            - agentRef
            - prompt
            - source
            type: object
          status:
            description: AgentRunStatus defines the observed state of AgentRun.
            properties:
              completionTime:
                description: When execution completed.
                format: date-time
                type: string
              conditions:
                description: Standard conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              cost:
                description: Estimated cost in USD.
                type: string
              jobName:
                description: Job name (task mode only).
                type: string
              mode:
                description: Mode inherited from the target agent (task or daemon).
                enum:
                - daemon
                - task
                type: string
              model:
                description: Actual model used (may differ from agent's primary if
                  fallback triggered).
                type: string
              outcome:
                description: |-
                  Outcome is the authoritative result of the run, written by the
                  executing agent at end-of-run via the run_finish built-in tool.
                  Replaces the legacy pullRequestURL/branch/commits fields — git
                  artifacts now appear in outcome.artifacts as kind=pr/mr/commit.
                properties:
                  artifacts:
                    description: |-
                      Artifacts produced by the run. Append-only during the run; frozen
                      once status.phase is terminal (Succeeded or Failed).
                    items:
                      description: AgentRunArtifact describes a durable external reference
                        produced by the run.
                      properties:
                        kind:
                          description: Kind of artifact.
                          enum:
                          - pr
                          - mr
                          - issue
                          - memory
                          - commit
                          type: string
                        provider:
                          description: Forge provider (github, gitlab, memory, ...).
                          type: string
                        ref:
                          description: Identifier within the provider (PR number,
                            issue number, memory id, sha).
                          type: string
                        title:
                          description: Short human title rendered in the console Run
                            card.
                          type: string
                        url:
                          description: Fully-qualified URL — where a human clicks.
                          type: string
                      required:
                      - kind
                      type: object
                    type: array
                  intent:
                    description: |-
                      Finalized intent. Authoritative — overrides spec.outcome.intent.
                      Console falls back to spec value when this is empty (run still in flight).
                      Set once at end-of-run; immutable thereafter.
                    enum:
                    - change
                    - plan
                    - incident
                    - discovery
                    - noop
                    type: string
                  summary:
                    description: |-
                      Short summary (1-3 sentences) written by the executing agent at
                      end-of-run, for rendering in the Run sidebar card.
                    type: string
                type: object
              output:
                description: Textual output from the agent run.
                type: string
              phase:
                description: 'Current phase: Pending, Queued, Running, Succeeded,
                  Failed.'
                type: string
              startTime:
                description: When execution started.
                format: date-time
                type: string
              tokensUsed:
                description: Total tokens consumed.
                type: integer
              toolCalls:
                description: Number of tool calls made during execution.
                type: integer
              traceID:
                description: OpenTelemetry trace ID for this run (hex-encoded 128-bit).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
