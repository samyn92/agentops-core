---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - serviceaccounts
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agents.agentops.io
  resources:
  - agentruns
  - agents
  - channels
  - integrations
  - providers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agents.agentops.io
  resources:
  - agentruns/finalizers
  - agents/finalizers
  - channels/finalizers
  - integrations/finalizers
  - providers/finalizers
  verbs:
  - update
- apiGroups:
  - agents.agentops.io
  resources:
  - agentruns/status
  - agents/status
  - channels/status
  - integrations/status
  - providers/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
