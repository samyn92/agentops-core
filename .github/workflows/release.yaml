name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-operator
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-gateway

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # Go: lint + test operator
  # =========================================================================
  operator-check:
    name: Operator Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m
      - name: Test
        run: make test
      - name: Build
        run: go build -o bin/manager cmd/main.go

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...

  # =========================================================================
  # Docker: build and push semver-tagged images
  # =========================================================================
  docker-operator:
    name: Release Operator
    runs-on: ubuntu-latest
    needs: [operator-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.OPERATOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-gateway:
    name: Release Gateway
    runs-on: ubuntu-latest
    needs: [gateway-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/mcp-gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GATEWAY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Helm: package chart, push OCI to GHCR
  # =========================================================================
  helm-chart:
    name: Release Helm Chart
    runs-on: ubuntu-latest
    needs: [operator-check]
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Set chart version and appVersion
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/agentops-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/agentops-operator/Chart.yaml
      - name: Helm Lint
        run: helm lint charts/agentops-operator
      - name: Helm Template
        run: helm template test charts/agentops-operator --namespace agent-system
      - name: Helm Package
        run: helm package charts/agentops-operator --destination dist/
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - name: Push Helm chart to GHCR OCI
        run: helm push dist/agentops-operator-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/agentops-operator-${{ steps.version.outputs.version }}.tgz

  # =========================================================================
  # GitHub Release with CRD manifests + Helm chart
  # =========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-operator, docker-gateway, helm-chart]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Generate CRD manifests
        run: make manifests
      - name: Package install manifests
        run: make build-installer IMG=${{ env.OPERATOR_IMAGE }}:${GITHUB_REF_NAME#v}
      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "AgentOps ${{ github.ref_name }}" \
            --generate-notes \
            dist/install.yaml \
            dist/agentops-operator-${{ steps.version.outputs.version }}.tgz
