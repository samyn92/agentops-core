name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-operator
  RUNTIME_FANTASY_IMAGE: ghcr.io/${{ github.repository_owner }}/agent-runtime-fantasy
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-gateway

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # Go: lint + test operator
  # =========================================================================
  operator-check:
    name: Operator Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m
      - name: Test
        run: make test
      - name: Build
        run: go build -o bin/manager cmd/main.go

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...

  # =========================================================================
  # Fantasy Runtime: Go build + vet
  # =========================================================================
  runtime-fantasy-check:
    name: Fantasy Runtime Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/agent-runtime-fantasy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: CGO_ENABLED=0 go build -o agent-runtime .
      - name: Vet
        run: go vet ./...

  # =========================================================================
  # Docker: build and push semver-tagged images
  # =========================================================================
  docker-operator:
    name: Release Operator
    runs-on: ubuntu-latest
    needs: [operator-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.OPERATOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-runtime-fantasy:
    name: Release Fantasy Runtime
    runs-on: ubuntu-latest
    needs: [runtime-fantasy-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/agent-runtime-fantasy
          push: true
          tags: |
            ${{ env.RUNTIME_FANTASY_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.RUNTIME_FANTASY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-gateway:
    name: Release Gateway
    runs-on: ubuntu-latest
    needs: [gateway-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/mcp-gateway
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GATEWAY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # GitHub Release with CRD manifests
  # =========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-operator, docker-runtime-fantasy, docker-gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Generate CRD manifests
        run: make manifests
      - name: Package install manifests
        run: make build-installer IMG=${{ env.OPERATOR_IMAGE }}:${GITHUB_REF_NAME#v}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "AgentOps ${{ github.ref_name }}" \
            --generate-notes \
            dist/install.yaml
