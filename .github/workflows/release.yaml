name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-operator
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-gateway

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # Go: lint + test operator
  # =========================================================================
  operator-check:
    name: Operator Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m
      - name: Test
        run: make test
      - name: Build
        run: go build -o bin/manager cmd/main.go

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...

  # =========================================================================
  # Docker: build and push semver-tagged images
  # =========================================================================
  docker-operator:
    name: Release Operator
    runs-on: ubuntu-latest
    needs: [operator-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.OPERATOR_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-gateway:
    name: Release Gateway
    runs-on: ubuntu-latest
    needs: [gateway-check]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/mcp-gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.GATEWAY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Helm: package chart, push OCI to GHCR
  # =========================================================================
  helm-chart:
    name: Release Helm Chart
    needs: [operator-check]
    uses: samyn92/.github/.github/workflows/helm-release.yaml@main
    with:
      chart-path: charts/agentops-operator
      upload-artifact: true
    secrets:
      registry-token: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # GitHub Release with CRD manifests + Helm chart
  # =========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-operator, docker-gateway, helm-chart]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Generate CRD manifests
        run: make manifests
      - name: Package install manifests
        run: make build-installer IMG=${{ env.OPERATOR_IMAGE }}:${GITHUB_REF_NAME#v}
      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "AgentOps ${{ github.ref_name }}" \
            --generate-notes \
            dist/install.yaml \
            dist/${{ needs.helm-chart.outputs.chart-artifact }}

  # =========================================================================
  # Notify: dispatch version bump to agentops-platform
  # =========================================================================
  notify-platform:
    name: Notify Platform
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Dispatch to agentops-platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: samyn92/agentops-platform
          event-type: dependency-update
          client-payload: |
            {
              "component": "agentops-operator",
              "version": "${{ steps.version.outputs.version }}",
              "source": "agentops-core"
            }
