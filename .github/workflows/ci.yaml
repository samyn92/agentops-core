name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  # =========================================================================
  # Go: lint, test, build operator
  # =========================================================================
  operator-lint:
    name: Operator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m

  operator-test:
    name: Operator Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: make test

  operator-build:
    name: Operator Build
    runs-on: ubuntu-latest
    needs: [operator-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o bin/manager cmd/main.go
      - name: Generate manifests
        run: make manifests

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-build:
    name: Gateway Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  # =========================================================================
  # Go: build + test token-injector
  # =========================================================================
  token-injector-build:
    name: Token Injector Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/token-injector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o token-injector .
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  # =========================================================================
  # Helm: lint and template the operator chart
  # =========================================================================
  helm-chart:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Helm Lint
        run: helm lint charts/agentops-operator
      - name: Helm Template
        run: helm template test charts/agentops-operator --namespace agent-system

  # Docker images are built and pushed by the Release workflow on tag.
  # CI only validates source code; per-arch image builds happen in
  # release.yaml (with native arm64 runners).
