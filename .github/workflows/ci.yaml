name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agenticops-operator
  RUNTIME_IMAGE: ghcr.io/${{ github.repository_owner }}/agent-runtime

jobs:
  # =========================================================================
  # Go: lint, test, build operator
  # =========================================================================
  operator-lint:
    name: Operator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  operator-test:
    name: Operator Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: make test

  operator-build:
    name: Operator Build
    runs-on: ubuntu-latest
    needs: [operator-lint, operator-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o bin/manager cmd/main.go
      - name: Generate manifests
        run: make manifests

  # =========================================================================
  # TypeScript: lint, build agent-runtime
  # =========================================================================
  runtime-build:
    name: Runtime Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/agent-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # =========================================================================
  # Docker: build and push images (main branch only)
  # =========================================================================
  docker-operator:
    name: Docker Operator
    runs-on: ubuntu-latest
    needs: [operator-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.OPERATOR_IMAGE }}:latest
            ${{ env.OPERATOR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-runtime:
    name: Docker Runtime
    runs-on: ubuntu-latest
    needs: [runtime-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/agent-runtime
          push: true
          tags: |
            ${{ env.RUNTIME_IMAGE }}:latest
            ${{ env.RUNTIME_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
