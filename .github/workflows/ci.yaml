name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-operator
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-gateway

jobs:
  # =========================================================================
  # Go: lint, test, build operator
  # =========================================================================
  operator-lint:
    name: Operator Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m

  operator-test:
    name: Operator Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: make test

  operator-build:
    name: Operator Build
    runs-on: ubuntu-latest
    needs: [operator-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o bin/manager cmd/main.go
      - name: Generate manifests
        run: make manifests

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-build:
    name: Gateway Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  # =========================================================================
  # Helm: lint and template the operator chart
  # =========================================================================
  helm-chart:
    name: Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Helm Lint
        run: helm lint charts/agentops-operator
      - name: Helm Template
        run: helm template test charts/agentops-operator --namespace agent-system

  # =========================================================================
  # Docker: build and push images (main branch only)
  # =========================================================================
  docker-operator:
    name: Docker Operator
    runs-on: ubuntu-latest
    needs: [operator-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.OPERATOR_IMAGE }}:latest
            ${{ env.OPERATOR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-gateway:
    name: Docker Gateway
    runs-on: ubuntu-latest
    needs: [gateway-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: images/mcp-gateway
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.GATEWAY_IMAGE }}:latest
            ${{ env.GATEWAY_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
